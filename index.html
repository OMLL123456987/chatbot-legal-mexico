<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>⚖️ Chatbot Legal México</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:800px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:120px;
padding:10px;
font-size:16px;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px 25px;
font-size:16px;
background:#2c3e50;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#34495e;
}

.respuesta{
margin-top:30px;
text-align:left;
white-space:pre-line;
background:#fafafa;
padding:20px;
border-radius:6px;
border:1px solid #ddd;
}

</style>

</head>

<body>

<div class="container">

<h1>⚖️ Chatbot Legal (México)</h1>

<p>Uso educativo. No sustituye asesoría legal.</p>

<textarea id="pregunta" placeholder="Ejemplo: Robé un carro con arma en CDMX, tengo 30 años"></textarea>

<br>

<button onclick="analizar()">Analizar caso</button>

<div class="respuesta" id="respuesta"></div>

</div>

<script>

async function analizar(){

const pregunta = document.getElementById("pregunta").value;

const respuestaBox = document.getElementById("respuesta");

if(!pregunta.trim()){
respuestaBox.innerText="⚠️ Escribe un caso para analizar.";
return;
}

respuestaBox.innerText="Analizando caso...";

try{

const res = await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({pregunta})
});

const data = await res.json();

respuestaBox.innerText=data.respuesta;

}catch(error){

respuestaBox.innerText="❌ Error de conexión con el servidor.";

}

}

</script>

</body>
</html>
